categorization_task:
  description: >
    First, read the fetched emails from the file at 'output/fetched_emails.json' using the `FileReadTool`.
    For each email in 'output/fetched_emails.json', analyze the body and categorize as follows:

    1. Category (choose one intent):
       - LOAN_EMI_PAID
       - WILL_PAY
       - UNABLE_TO_PAY
       - SETTLEMENT_REQUEST
       - OTHER

    2. Priority (choose one):
      IMPORTANT - BE VERY STRICT WITH PRIORITY LEVELS:
      - HIGH: Urgent, needs immediate attention or response (WILL_PAY,SETTLEMENT_REQUEST)
      - MEDIUM: Only LOAN_EMI_PAID can be MEDIUM.
      - LOW: All others

    3. Required Action (choose one):
      - "REPLY" 
      - "IGNORE"
    
    IMPORTANT FORMAT INSTRUCTIONS:
    Your final answer must be a valid JSON object with these exact fields(example without the quotes):
      "email_id": "The email's unique identifier",
      "subject": "The email's subject line",
      "sender": "The email sender",
      "category": "The category you assigned",
      "priority": "The priority you assigned",
      "required_action": "The action needed",
      "date": "The email date in YYYY-MM-DD format",
      "age_days": "The age of the email in days"
    
    Do not include any explanations, thoughts, or additional text outside the JSON object.
    Do not use markdown formatting or code blocks.
    Just return the raw JSON object.
  expected_output: >
    A JSON object with email_id, subject, category, priority, and required_action fields for each emails'.
  agent: categorizer
  output_file: output/categorization_report.json

organization_task:
  description: >
    First, read the categorization report from 'output/categorization_report.json' using the `FileReadTool`.
    
    For each email in 'output/categorization_report.json',

    Use the categorization report to determine the correct labels.
    
    Star and label the email based on Category:
    1. For WILL_PAY::
       - Add "POSITIVE_CUSTOMER" label
    
    2. For UNABLE_TO_PAY:
       - Add "NEGATIVE_CUSTOMER" label
    
    3.For SETTLEMENT_REQUEST:
       - Add "SETTLEMENT_REQUEST" label
       - Star the email

    4.For LOAN_EMI_PAID:
       - Add "PAID" label.

    4. For other emails:
       - OTHER
      
    Your final answer should be a JSON object with:
    A JSON object with a key 'emails' containing a list of email object (email_id, subject, applied_labels, starred, and result) fields.
    - email_id: The email's ID
    - subject: The email's subject
    - applied_labels: Label applied
    - starred: True or False
    - result: "Success" or error message

    For each email, Use 'organize_email' tool to implement the label and star in Gmail.
    
  expected_output: >
    A JSON object with a key 'emails' containing a list of email object (email_id, subject, applied_labels, starred, and result) fields.
  agent: organizer
  context: [categorization_task]
  output_file: output/organization_report.json

response_task:
  description: >
    First, read the emails you have to respond from 'output/fetched_emails.json' using the `FileReadTool`.
    For each email in output/fetched_emails.json:
    1. Get customer loan data using sender_email from `get_customer_data` tool
    2. Draft personalized response based on loan history and email body
    3. Your final answer should be a JSON object with:
    4 JSON object with a key 'emails' containing list of email object 
       - subject: "Re: " + original subject
       - body: crafted response
       - recipient: sender_email
       - draft_saved: True or False
    For each email, use 'save_email_draft' tool to implement Saving draft in gmail:
  expected_output: >
   A JSON object with a key 'emails' containing a list of email object (email_id,subject,recipient,draft_saved) fields for whom the email is drafted.
  agent: response_generator
